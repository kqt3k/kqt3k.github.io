<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🤪 пранк-окна</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            overflow: hidden;
            position: relative;
        }

        /* стиль бегающего окна */
        .prank-window {
            position: absolute;
            width: 180px;
            background: #fffaf0;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.4), 0 0 0 3px #ffb347, 0 0 0 6px #ffdd99;
            overflow: hidden;
            cursor: grab;
            animation: pop-in 0.2s cubic-bezier(0.34, 1.2, 0.8, 1);
            z-index: 100;
        }

        .prank-window:active {
            cursor: grabbing;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .window-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            background: #2c2c2c;
            border-bottom: 2px solid #ffaa44;
        }

        .window-footer {
            background: #f4e3c6;
            padding: 6px 8px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .close-btn {
            background: #e63946;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.07s linear;
            box-shadow: 0 1px 3px black;
            font-family: monospace;
        }

        .close-btn:hover {
            background: #c92a2a;
            transform: scale(1.05);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        /* мобильная адаптация */
        @media (max-width: 600px) {
            .prank-window {
                width: 140px;
            }
            .window-img {
                height: 110px;
            }
            .close-btn {
                width: 26px;
                height: 26px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<script>
    // ссылка на пранк-фото
    const PRANK_IMAGE_URL = "https://iimg.su/i/MVQUot";

    let createInterval = null;
    let divideInterval = null;
    let animationId = null;

    // создание нового окна с заданными параметрами
    function createWindowElement(leftPos, topPos, vx, vy) {
        const winDiv = document.createElement('div');
        winDiv.className = 'prank-window';
        
        const img = document.createElement('img');
        img.className = 'window-img';
        img.src = PRANK_IMAGE_URL;
        img.alt = "🤪";
        img.onerror = function() {
            this.onerror = null;
            this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffcc88'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='%23aa5533'%3E😂%3C/text%3E%3C/svg%3E";
        };
        
        const footer = document.createElement('div');
        footer.className = 'window-footer';
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.innerHTML = '✖';
        closeBtn.title = "закрыть (разделится!)";
        
        footer.appendChild(closeBtn);
        winDiv.appendChild(img);
        winDiv.appendChild(footer);
        
        winDiv.style.left = leftPos + 'px';
        winDiv.style.top = topPos + 'px';
        winDiv.dataset.vx = vx;
        winDiv.dataset.vy = vy;
        
        // обработчик закрытия — деление окна
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            divideSingleWindow(winDiv);
        });
        
        document.body.appendChild(winDiv);
        return winDiv;
    }
    
    // деление одного окна на два
    function divideSingleWindow(oldWindow) {
        if (!oldWindow || !oldWindow.parentNode) return;
        
        const left = parseFloat(oldWindow.style.left);
        const top = parseFloat(oldWindow.style.top);
        const vx = parseFloat(oldWindow.dataset.vx);
        const vy = parseFloat(oldWindow.dataset.vy);
        const width = oldWindow.offsetWidth;
        const height = oldWindow.offsetHeight;
        
        const maxX = window.innerWidth - width;
        const maxY = window.innerHeight - height;
        
        oldWindow.remove();
        
        // смещения для новых окон
        const randOffset1X = (Math.random() - 0.5) * 45;
        const randOffset1Y = (Math.random() - 0.5) * 45;
        let newLeft1 = left + randOffset1X;
        let newTop1 = top + randOffset1Y;
        newLeft1 = Math.min(Math.max(5, newLeft1), maxX);
        newTop1 = Math.min(Math.max(5, newTop1), maxY);
        
        const randOffset2X = (Math.random() - 0.5) * 45;
        const randOffset2Y = (Math.random() - 0.5) * 45;
        let newLeft2 = left + randOffset2X;
        let newTop2 = top + randOffset2Y;
        newLeft2 = Math.min(Math.max(5, newLeft2), maxX);
        newTop2 = Math.min(Math.max(5, newTop2), maxY);
        
        // новые скорости с хаосом
        let newVx1 = vx + (Math.random() - 0.5) * 2.2;
        let newVy1 = vy + (Math.random() - 0.5) * 2.2;
        let newVx2 = vx + (Math.random() - 0.5) * 2.2;
        let newVy2 = vy + (Math.random() - 0.5) * 2.2;
        
        newVx1 = Math.min(Math.max(newVx1, -5.2), 5.2);
        newVy1 = Math.min(Math.max(newVy1, -5.2), 5.2);
        newVx2 = Math.min(Math.max(newVx2, -5.2), 5.2);
        newVy2 = Math.min(Math.max(newVy2, -5.2), 5.2);
        
        if (Math.abs(newVx1) < 0.7) newVx1 += (Math.random() - 0.5) * 1.5;
        if (Math.abs(newVy1) < 0.7) newVy1 += (Math.random() - 0.5) * 1.5;
        if (Math.abs(newVx2) < 0.7) newVx2 += (Math.random() - 0.5) * 1.5;
        if (Math.abs(newVy2) < 0.7) newVy2 += (Math.random() - 0.5) * 1.5;
        
        createWindowElement(newLeft1, newTop1, newVx1, newVy1);
        createWindowElement(newLeft2, newTop2, newVx2, newVy2);
    }
    
    // деление ВСЕХ окон (каждые 2 секунды)
    function divideAllWindows() {
        const allWindows = document.querySelectorAll('.prank-window');
        const windowsSnapshot = Array.from(allWindows);
        for (let win of windowsSnapshot) {
            if (win && win.parentNode) {
                divideSingleWindow(win);
            }
        }
    }
    
    // создание нового окна каждую секунду
    function spawnNewWindow() {
        const winWidth = 180;
        const winHeight = 200;
        const maxX = Math.max(50, window.innerWidth - winWidth - 10);
        const maxY = Math.max(50, window.innerHeight - winHeight - 10);
        
        const randLeft = Math.random() * maxX;
        const randTop = Math.random() * maxY;
        let randVx = (Math.random() - 0.5) * 8;
        let randVy = (Math.random() - 0.5) * 8;
        if (Math.abs(randVx) < 1) randVx += (Math.random() - 0.5) * 3;
        if (Math.abs(randVy) < 1) randVy += (Math.random() - 0.5) * 3;
        randVx = Math.min(Math.max(randVx, -6), 6);
        randVy = Math.min(Math.max(randVy, -6), 6);
        
        createWindowElement(randLeft, randTop, randVx, randVy);
    }
    
    // анимация движения (быстрое перемещение)
    function updatePositions() {
        const windows = document.querySelectorAll('.prank-window');
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        
        for (let win of windows) {
            let left = parseFloat(win.style.left);
            let top = parseFloat(win.style.top);
            let vx = parseFloat(win.dataset.vx);
            let vy = parseFloat(win.dataset.vy);
            if (isNaN(left) || isNaN(top)) continue;
            
            const width = win.offsetWidth;
            const height = win.offsetHeight;
            
            let newLeft = left + vx;
            let newTop = top + vy;
            let newVx = vx;
            let newVy = vy;
            
            if (newLeft <= 0) {
                newLeft = 0;
                newVx = -vx;
            }
            if (newLeft + width >= screenW) {
                newLeft = screenW - width;
                newVx = -vx;
            }
            if (newTop <= 0) {
                newTop = 0;
                newVy = -vy;
            }
            if (newTop + height >= screenH) {
                newTop = screenH - height;
                newVy = -vy;
            }
            
            win.style.left = newLeft + 'px';
            win.style.top = newTop + 'px';
            win.dataset.vx = newVx;
            win.dataset.vy = newVy;
        }
        
        animationId = requestAnimationFrame(updatePositions);
    }
    
    // адаптация при изменении размера окна
    function handleResize() {
        const windows = document.querySelectorAll('.prank-window');
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        for (let w of windows) {
            let left = parseFloat(w.style.left);
            let top = parseFloat(w.style.top);
            const width = w.offsetWidth;
            const height = w.offsetHeight;
            let changed = false;
            if (left + width > winW) {
                left = winW - width - 2;
                changed = true;
            }
            if (left < 0) {
                left = 2;
                changed = true;
            }
            if (top + height > winH) {
                top = winH - height - 2;
                changed = true;
            }
            if (top < 0) {
                top = 2;
                changed = true;
            }
            if (changed) {
                w.style.left = left + 'px';
                w.style.top = top + 'px';
            }
        }
    }
    
    // запуск пранка
    function init() {
        // стартовое окно
        const startX = window.innerWidth / 2 - 90;
        const startY = window.innerHeight / 2 - 100;
        const startVx = (Math.random() - 0.5) * 5;
        const startVy = (Math.random() - 0.5) * 5;
        createWindowElement(startX, startY, startVx, startVy);
        
        // интервал создания окон (каждую 1 секунду)
        createInterval = setInterval(spawnNewWindow, 1000);
        
        // интервал деления всех окон (каждые 2 секунды)
        divideInterval = setInterval(divideAllWindows, 2000);
        
        // анимация движения
        animationId = requestAnimationFrame(updatePositions);
        
        window.addEventListener('resize', handleResize);
    }
    
    init();
</script>
</body>
</html>
