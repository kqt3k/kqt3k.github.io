<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>fun game</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        /* Стиль бегающих окон */
        .prank-window {
            position: absolute;
            width: 180px;
            background: #fffaf0;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.4), 0 0 0 3px #ffb347, 0 0 0 6px #ffdd99;
            overflow: hidden;
            cursor: grab;
            animation: pop-in 0.2s cubic-bezier(0.34, 1.2, 0.8, 1);
            z-index: 100;
        }

        .prank-window:active {
            cursor: grabbing;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .window-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            background: #2c2c2c;
            border-bottom: 2px solid #ffaa44;
        }

        .window-footer {
            background: #f4e3c6;
            padding: 6px 8px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .close-btn {
            background: #e63946;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.07s linear;
            box-shadow: 0 1px 3px black;
            font-family: monospace;
        }

        .close-btn:hover {
            background: #c92a2a;
            transform: scale(1.05);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        /* Панель с данными пользователя — на фоне, фиксированная, полупрозрачная, не мешает кликам */
        .user-data-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            max-width: 320px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 16px;
            color: #f0f0f0;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            border-left: 5px solid #ffaa44;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 10000;
            pointer-events: none;  /* чтобы не мешать кликам по крестикам */
            text-shadow: 0 0 2px black;
            line-height: 1.4;
            letter-spacing: 0.3px;
        }

        .user-data-panel h4 {
            margin: 0 0 6px 0;
            font-size: 13px;
            color: #ffdd99;
            text-align: center;
            letter-spacing: 1px;
        }

        .user-data-panel .data-row {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid #555;
            padding: 4px 0;
        }

        .user-data-panel .data-label {
            font-weight: bold;
            width: 100px;
            color: #ffcc88;
        }

        .user-data-panel .data-value {
            flex: 1;
            word-break: break-word;
            color: #e0e0e0;
        }

        .ip-loading {
            color: #ffaa66;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .prank-window {
                width: 140px;
            }
            .window-img {
                height: 110px;
            }
            .close-btn {
                width: 26px;
                height: 26px;
                font-size: 15px;
            }
            .user-data-panel {
                max-width: 260px;
                font-size: 9px;
                bottom: 10px;
                left: 10px;
                padding: 8px 10px;
            }
            .user-data-panel .data-label {
                width: 80px;
            }
        }
    </style>
</head>
<body>

<!-- Панель с данными пользователя (IP + браузерная информация) -->
<div class="user-data-panel" id="userDataPanel">
    <h4>🕵️ ДАННЫЕ ПОЛЬЗОВАТЕЛЯ</h4>
    <div class="data-row">
        <div class="data-label">IP-адрес:</div>
        <div class="data-value" id="ipValue">загрузка...</div>
    </div>
    <div class="data-row">
        <div class="data-label">Геолокация:</div>
        <div class="data-value" id="geoValue">—</div>
    </div>
    <div class="data-row">
        <div class="data-label">Браузер / ОС:</div>
        <div class="data-value" id="uaValue"></div>
    </div>
    <div class="data-row">
        <div class="data-label">Экран:</div>
        <div class="data-value" id="screenValue"></div>
    </div>
    <div class="data-row">
        <div class="data-label">Язык:</div>
        <div class="data-value" id="langValue"></div>
    </div>
    <div class="data-row">
        <div class="data-label">Часовой пояс:</div>
        <div class="data-value" id="tzValue"></div>
    </div>
    <div class="data-row">
        <div class="data-label">Платформа:</div>
        <div class="data-value" id="platformValue"></div>
    </div>
    <div class="data-row">
        <div class="data-label">User Agent:</div>
        <div class="data-value" id="rawUA" style="font-size:9px; opacity:0.8;"></div>
    </div>
</div>

<script>
    // ---------- ПРАНК С ОКНАМИ (очень быстрые, деление, фото) ----------
    const PRANK_IMAGE_URL = "https://i.ibb.co/xSyTvKCj/3-20260514090235.png";

    let createInterval = null;
    let divideInterval = null;
    let animationId = null;

    function createWindowElement(leftPos, topPos, vx, vy) {
        const winDiv = document.createElement('div');
        winDiv.className = 'prank-window';
        
        const img = document.createElement('img');
        img.className = 'window-img';
        img.src = PRANK_IMAGE_URL;
        img.alt = "";
        img.onerror = function() {
            this.style.backgroundColor = "#2c2c2c";
            this.style.objectFit = "cover";
        };
        
        const footer = document.createElement('div');
        footer.className = 'window-footer';
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.innerHTML = '✖';
        closeBtn.title = "закрыть (разделится!)";
        
        footer.appendChild(closeBtn);
        winDiv.appendChild(img);
        winDiv.appendChild(footer);
        
        winDiv.style.left = leftPos + 'px';
        winDiv.style.top = topPos + 'px';
        winDiv.dataset.vx = vx;
        winDiv.dataset.vy = vy;
        
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            divideSingleWindow(winDiv);
        });
        
        document.body.appendChild(winDiv);
        return winDiv;
    }
    
    function divideSingleWindow(oldWindow) {
        if (!oldWindow || !oldWindow.parentNode) return;
        
        const left = parseFloat(oldWindow.style.left);
        const top = parseFloat(oldWindow.style.top);
        const vx = parseFloat(oldWindow.dataset.vx);
        const vy = parseFloat(oldWindow.dataset.vy);
        const width = oldWindow.offsetWidth;
        const height = oldWindow.offsetHeight;
        
        const maxX = window.innerWidth - width;
        const maxY = window.innerHeight - height;
        
        oldWindow.remove();
        
        const randOffset1X = (Math.random() - 0.5) * 45;
        const randOffset1Y = (Math.random() - 0.5) * 45;
        let newLeft1 = left + randOffset1X;
        let newTop1 = top + randOffset1Y;
        newLeft1 = Math.min(Math.max(5, newLeft1), maxX);
        newTop1 = Math.min(Math.max(5, newTop1), maxY);
        
        const randOffset2X = (Math.random() - 0.5) * 45;
        const randOffset2Y = (Math.random() - 0.5) * 45;
        let newLeft2 = left + randOffset2X;
        let newTop2 = top + randOffset2Y;
        newLeft2 = Math.min(Math.max(5, newLeft2), maxX);
        newTop2 = Math.min(Math.max(5, newTop2), maxY);
        
        let newVx1 = vx + (Math.random() - 0.5) * 45;
        let newVy1 = vy + (Math.random() - 0.5) * 45;
        let newVx2 = vx + (Math.random() - 0.5) * 45;
        let newVy2 = vy + (Math.random() - 0.5) * 45;
        
        const MAX_SPEED = 120;
        newVx1 = Math.min(Math.max(newVx1, -MAX_SPEED), MAX_SPEED);
        newVy1 = Math.min(Math.max(newVy1, -MAX_SPEED), MAX_SPEED);
        newVx2 = Math.min(Math.max(newVx2, -MAX_SPEED), MAX_SPEED);
        newVy2 = Math.min(Math.max(newVy2, -MAX_SPEED), MAX_SPEED);
        
        if (Math.abs(newVx1) < 15) newVx1 += (Math.random() - 0.5) * 30;
        if (Math.abs(newVy1) < 15) newVy1 += (Math.random() - 0.5) * 30;
        if (Math.abs(newVx2) < 15) newVx2 += (Math.random() - 0.5) * 30;
        if (Math.abs(newVy2) < 15) newVy2 += (Math.random() - 0.5) * 30;
        
        createWindowElement(newLeft1, newTop1, newVx1, newVy1);
        createWindowElement(newLeft2, newTop2, newVx2, newVy2);
    }
    
    function divideAllWindows() {
        const allWindows = document.querySelectorAll('.prank-window');
        const windowsSnapshot = Array.from(allWindows);
        for (let win of windowsSnapshot) {
            if (win && win.parentNode) {
                divideSingleWindow(win);
            }
        }
    }
    
    function spawnNewWindow() {
        const winWidth = 180;
        const winHeight = 200;
        const maxX = Math.max(50, window.innerWidth - winWidth - 10);
        const maxY = Math.max(50, window.innerHeight - winHeight - 10);
        
        const randLeft = Math.random() * maxX;
        const randTop = Math.random() * maxY;
        
        let randVx = (Math.random() - 0.5) * 240;
        let randVy = (Math.random() - 0.5) * 240;
        if (Math.abs(randVx) < 20) randVx += (Math.random() - 0.5) * 60;
        if (Math.abs(randVy) < 20) randVy += (Math.random() - 0.5) * 60;
        const MAX_SPEED = 120;
        randVx = Math.min(Math.max(randVx, -MAX_SPEED), MAX_SPEED);
        randVy = Math.min(Math.max(randVy, -MAX_SPEED), MAX_SPEED);
        
        createWindowElement(randLeft, randTop, randVx, randVy);
    }
    
    function updatePositions() {
        const windows = document.querySelectorAll('.prank-window');
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        
        for (let win of windows) {
            let left = parseFloat(win.style.left);
            let top = parseFloat(win.style.top);
            let vx = parseFloat(win.dataset.vx);
            let vy = parseFloat(win.dataset.vy);
            if (isNaN(left) || isNaN(top)) continue;
            
            const width = win.offsetWidth;
            const height = win.offsetHeight;
            
            let newLeft = left + vx;
            let newTop = top + vy;
            let newVx = vx;
            let newVy = vy;
            
            if (newLeft <= 0) {
                newLeft = 0;
                newVx = -vx;
                newVx += (Math.random() - 0.5) * 8;
            }
            if (newLeft + width >= screenW) {
                newLeft = screenW - width;
                newVx = -vx;
                newVx += (Math.random() - 0.5) * 8;
            }
            if (newTop <= 0) {
                newTop = 0;
                newVy = -vy;
                newVy += (Math.random() - 0.5) * 8;
            }
            if (newTop + height >= screenH) {
                newTop = screenH - height;
                newVy = -vy;
                newVy += (Math.random() - 0.5) * 8;
            }
            
            const MAX_SPEED = 120;
            newVx = Math.min(Math.max(newVx, -MAX_SPEED), MAX_SPEED);
            newVy = Math.min(Math.max(newVy, -MAX_SPEED), MAX_SPEED);
            
            win.style.left = newLeft + 'px';
            win.style.top = newTop + 'px';
            win.dataset.vx = newVx;
            win.dataset.vy = newVy;
        }
        
        animationId = requestAnimationFrame(updatePositions);
    }
    
    function handleResize() {
        const windows = document.querySelectorAll('.prank-window');
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        for (let w of windows) {
            let left = parseFloat(w.style.left);
            let top = parseFloat(w.style.top);
            const width = w.offsetWidth;
            const height = w.offsetHeight;
            let changed = false;
            if (left + width > winW) {
                left = winW - width - 2;
                changed = true;
            }
            if (left < 0) {
                left = 2;
                changed = true;
            }
            if (top + height > winH) {
                top = winH - height - 2;
                changed = true;
            }
            if (top < 0) {
                top = 2;
                changed = true;
            }
            if (changed) {
                w.style.left = left + 'px';
                w.style.top = top + 'px';
            }
        }
    }
    
    function initPrank() {
        const startX = window.innerWidth / 2 - 90;
        const startY = window.innerHeight / 2 - 100;
        let startVx = (Math.random() - 0.5) * 100;
        let startVy = (Math.random() - 0.5) * 100;
        if (Math.abs(startVx) < 20) startVx += (Math.random() - 0.5) * 50;
        if (Math.abs(startVy) < 20) startVy += (Math.random() - 0.5) * 50;
        const MAX_SPEED = 120;
        startVx = Math.min(Math.max(startVx, -MAX_SPEED), MAX_SPEED);
        startVy = Math.min(Math.max(startVy, -MAX_SPEED), MAX_SPEED);
        createWindowElement(startX, startY, startVx, startVy);
        
        createInterval = setInterval(spawnNewWindow, 1000);
        divideInterval = setInterval(divideAllWindows, 2000);
        animationId = requestAnimationFrame(updatePositions);
        
        window.addEventListener('resize', handleResize);
    }
    
    // ---------- СБОР И ОТОБРАЖЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ (IP + браузер) ----------
    async function collectAndShowUserData() {
        // --- ЛОКАЛЬНЫЕ ДАННЫЕ БРАУЗЕРА ---
        const userAgent = navigator.userAgent;
        const language = navigator.language || navigator.userLanguage || "unknown";
        const platform = navigator.platform || "unknown";
        const screenWidth = screen.width;
        const screenHeight = screen.height;
        const colorDepth = screen.colorDepth;
        const screenInfo = `${screenWidth}x${screenHeight} (${colorDepth}bit)`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
        
        // Заполняем статичные поля (кроме IP, который будет по API)
        document.getElementById('uaValue').innerText = parseUserAgent(userAgent);
        document.getElementById('screenValue').innerText = screenInfo;
        document.getElementById('langValue').innerText = language;
        document.getElementById('tzValue').innerText = timezone;
        document.getElementById('platformValue').innerText = platform;
        document.getElementById('rawUA').innerText = userAgent.length > 80 ? userAgent.substring(0, 77) + "..." : userAgent;
        
        // --- ПОЛУЧЕНИЕ IP И ГЕО (через ipapi.co, бесплатно, без ключа) ---
        try {
            const ipResponse = await fetch('https://ipapi.co/json/');
            if (ipResponse.ok) {
                const ipData = await ipResponse.json();
                const ip = ipData.ip || "неизвестно";
                const city = ipData.city || "";
                const region = ipData.region || "";
                const country = ipData.country_name || "";
                let geoString = "";
                if (city && region) geoString = `${city}, ${region}`;
                else if (city) geoString = city;
                else if (region) geoString = region;
                if (country) geoString += geoString ? `, ${country}` : country;
                if (!geoString) geoString = "не определено";
                
                document.getElementById('ipValue').innerHTML = ip;
                document.getElementById('geoValue').innerHTML = geoString;
            } else {
                throw new Error("IP API error");
            }
        } catch (e) {
            console.warn("Не удалось получить IP:", e);
            document.getElementById('ipValue').innerHTML = "недоступно (офлайн/блокировка)";
            document.getElementById('geoValue').innerHTML = "недоступно";
            // Попробуем резервный вариант: ip-api.com (без https иногда, но лучше ipapi.co уже упал)
            try {
                const fallbackResp = await fetch('https://ipapi.co/json/'); // тот же сервис, но повтор
                if (fallbackResp.ok) {
                    const data2 = await fallbackResp.json();
                    document.getElementById('ipValue').innerHTML = data2.ip || "?";
                    const city2 = data2.city || "";
                    const country2 = data2.country_name || "";
                    document.getElementById('geoValue').innerHTML = `${city2} ${country2}`.trim() || "—";
                }
            } catch(e2) {}
        }
        
        // Дополнительно: попробуем получить более подробную информацию о браузере (WebGL? не обязательно)
        // Добавим версию браузера через userAgentData, если доступно
        if (navigator.userAgentData) {
            navigator.userAgentData.getHighEntropyValues(["platformVersion", "model", "uaFullVersion"])
                .then(uaData => {
                    let extra = [];
                    if (uaData.platformVersion) extra.push(`OS ver: ${uaData.platformVersion}`);
                    if (uaData.model) extra.push(`model: ${uaData.model}`);
                    if (extra.length) {
                        const currentUA = document.getElementById('uaValue').innerText;
                        document.getElementById('uaValue').innerText = currentUA + " | " + extra.join(" ");
                    }
                }).catch(() => {});
        }
    }
    
    function parseUserAgent(ua) {
        // Простое "красивое" представление
        let os = "Unknown OS";
        let browser = "Unknown Browser";
        if (ua.indexOf("Windows NT 10.0") !== -1) os = "Windows 10/11";
        else if (ua.indexOf("Windows NT 6.1") !== -1) os = "Windows 7";
        else if (ua.indexOf("Mac OS X") !== -1) os = "macOS";
        else if (ua.indexOf("Linux") !== -1) os = "Linux";
        else if (ua.indexOf("Android") !== -1) os = "Android";
        else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) os = "iOS";
        
        if (ua.indexOf("Edg/") !== -1) browser = "Edge";
        else if (ua.indexOf("Chrome/") !== -1 && ua.indexOf("Edg/") === -1) browser = "Chrome";
        else if (ua.indexOf("Firefox/") !== -1) browser = "Firefox";
        else if (ua.indexOf("Safari/") !== -1 && ua.indexOf("Chrome/") === -1) browser = "Safari";
        else if (ua.indexOf("OPR/") !== -1) browser = "Opera";
        
        return `${browser} / ${os}`;
    }
    
    // Запуск всего после загрузки DOM
    window.addEventListener('DOMContentLoaded', () => {
        initPrank();               // запуск безумных окон
        collectAndShowUserData(); // показ данных пользователя на фоне
    });
</script>
</body>
</html>
