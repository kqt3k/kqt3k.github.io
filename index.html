<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, minimum-scale=0.5">
  <title>Кликер · Котость</title>
  <link rel="icon" href="lvl1cat.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      font-family:'Segoe UI','Poppins',sans-serif; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(145deg,#2d1b00,#140e04);
      background-size:cover; background-position:center;
      transition:background-image 0.5s; position:relative; overflow:hidden;
    }
    body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:0; }
    #cosmetics-layer, #pets-layer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
    .cosmetic-item { position:absolute; font-size:35px; opacity:0.8; animation-duration:12s; animation-iteration-count:infinite; animation-timing-function:linear; }
    @keyframes floatHorizontal { 0%{transform:translateX(0) translateY(0);} 25%{transform:translateX(30vw) translateY(-10vh);} 50%{transform:translateX(60vw) translateY(5vh);} 75%{transform:translateX(30vw) translateY(15vh);} 100%{transform:translateX(0) translateY(0);} }
    @keyframes floatDiagonal { 0%{transform:translate(0,0);} 50%{transform:translate(40vw,-30vh);} 100%{transform:translate(0,0);} }
    @keyframes floatCircle { 0%{transform:translate(0,0) rotate(0deg);} 100%{transform:translate(40vw,20vh) rotate(360deg);} }
    @keyframes floatZigZag { 0%{transform:translate(0,0);} 25%{transform:translate(-20vw,10vh);} 50%{transform:translate(10vw,-5vh);} 75%{transform:translate(-30vw,-15vh);} 100%{transform:translate(0,0);} }

    #app { position:relative; z-index:10; width:95%; max-width:1200px; max-height:95vh; display:flex; flex-direction:column; gap:8px; }
    .tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    .tab-btn {
      background:rgba(0,0,0,0.6); border:2px solid #ffd58c; border-radius:25px;
      padding:8px 16px; color:#ffd58c; font-weight:bold; cursor:pointer; transition:0.2s; font-size:0.9rem;
    }
    .tab-btn.active { background:rgba(80,40,0,0.9); border-color:#ffaa33; }
    .tab-content { display:none; flex-direction:row; gap:15px; flex:1; overflow-y:auto; max-height:80vh; }
    .tab-content.active { display:flex; }
    .clicker-area {
      background:rgba(30,15,0,0.8); backdrop-filter:blur(15px); border-radius:40px;
      padding:20px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border:1px solid rgba(255,180,60,0.5);
      display:flex; flex-direction:column; align-items:center; flex:0 0 300px;
    }
    .upgrades-area {
      background:rgba(20,10,0,0.75); backdrop-filter:blur(12px); border-radius:30px;
      padding:12px; flex:1; overflow-y:auto; max-height:80vh;
    }
    .cookie-image { width:120px; height:120px; object-fit:contain; border-radius:50%; background:rgba(0,0,0,0.3); padding:8px; cursor:pointer; transition:0.1s; }
    .cookie-image:active { transform:scale(0.9); }
    .score { font-size:2.5rem; font-weight:800; background:linear-gradient(135deg,#ffdf80,#c4870a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:8px 0; font-family:'Courier New',monospace; }
    .per-second { color:#f3c26b; font-size:1rem; margin-bottom:4px; }
    .level-info { background:#4a2c0f; padding:5px 18px; border-radius:30px; color:#ffd58c; font-weight:bold; margin:6px 0; cursor:pointer; }
    .free-upgrade-btn { background:#c47a1a; border:none; padding:8px 16px; border-radius:25px; color:white; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #7a4b1d; margin:6px 0; }
    .free-upgrade-btn:disabled { opacity:0.5; pointer-events:none; }
    .upgrade-item { display:flex; justify-content:space-between; align-items:center; background:rgba(80,40,0,0.5); margin:6px 0; padding:8px 12px; border-radius:18px; border:1px solid #af7d3a; }
    .upgrade-item:hover { background:rgba(120,60,0,0.6); }
    .upgrade-info { flex:1; }
    .upgrade-name { font-weight:bold; color:#ffd58c; font-size:0.9rem; }
    .upgrade-desc { color:#cca66b; font-size:0.7rem; }
    .upgrade-cost { font-weight:bold; color:#ffaa33; margin-right:6px; white-space:nowrap; font-size:0.8rem; }
    .buy-btn, .prestige-btn { background:#7a4b1d; border:none; padding:5px 10px; border-radius:16px; color:white; font-weight:bold; cursor:pointer; box-shadow:0 3px 0 #4a2c0f; margin-left:4px; }
    .prestige-btn { background:#9b4d1f; box-shadow:0 3px 0 #5c2d0a; }

    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; visibility:hidden; opacity:0; transition:0.2s; }
    .modal-overlay.open { visibility:visible; opacity:1; }
    .modal-content { background:rgba(20,10,0,0.95); border-radius:25px; padding:20px; max-width:400px; width:90%; max-height:80vh; overflow-y:auto; color:#ffd58c; border:1px solid #ffb347; text-align:center; }

    .egg-btn { background:#d4a017; border:none; padding:8px 18px; border-radius:20px; font-weight:bold; cursor:pointer; margin:4px; }
    .pet-card { background:rgba(80,40,0,0.5); border-radius:15px; padding:8px; margin:4px; display:flex; align-items:center; gap:8px; flex:1 1 160px; cursor:pointer; }

    .currency-value { color:#ffffff; font-weight:bold; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:10px; }

    .pet-emoji { font-size:40px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,200,100,0.3); }
    .pet-emoji.vacuum { background:#888; }
    .pet-emoji.cube_earth { background:#8B4513; }
    .pet-emoji.chi_cat { background:purple; }
    .pet-emoji.golden_mouse { background:gold; }
    .pet-emoji.star_spirit { background:lightblue; }
    .pet-emoji.kotost { background:#c4870a; }
    .pet-emoji.azbukabik { background:#aaa; }
    .pet-emoji.heartpet { background:pink; }
    .pet-emoji.mishasdr { background:#ff5722; }
    .pet-emoji.nekotpet { background:#9c27b0; }
    .pet-emoji.supporter { background:#4caf50; }

    .nickname-display { color:#ffd58c; font-size:0.9rem; margin-bottom:5px; }
    .promo-input { padding:5px 10px; border-radius:15px; border:1px solid #ffaa33; background:rgba(0,0,0,0.5); color:#ffd58c; }

    .gift-box { display:flex; align-items:center; gap:10px; margin:8px 0; }
    .gift-timer { color:#ffd58c; font-weight:bold; }
    .claim-gift-btn { background:#27ae60; border:none; padding:4px 12px; border-radius:15px; color:white; font-weight:bold; cursor:pointer; }
    .ad-banner { margin-top:15px; background:rgba(0,0,0,0.4); padding:10px; border-radius:15px; }
    .ad-banner img { max-width:100%; }
    @media (max-width:750px) {
      .tab-content { flex-direction:column; }
      .clicker-area { flex:0 0 auto; width:100%; }
    }
  </style>
</head>
<body>
<div id="cosmetics-layer"></div>
<div id="pets-layer" style="pointer-events:none; z-index:2;"></div>

<div id="app">

    <button class="tab-btn active" data-tab="clicker">🐱 Кликер</button>

      <div class="level-info" id="levelDisplay">Уровень 1</div>
    </div>
    <div class="upgrades-area" id="upgradesContainer"></div>
  </div>

  <!-- Яйца -->
  <div id="tab-eggs" class="tab-content" style="flex-direction:column; align-items:center;">
    <h2 style="color:#ffd58c;">🥚 Магазин яиц</h2>

      <button class="egg-btn" id="buy3Diamond">3 яйца (2 алмаза)</button>
    </div>

    <div id="hatchResult" style="margin-top:10px; color:#ffd58c;"></div>
    <div id="chancesPanel" style="margin-top:10px; display:none; color:#ffd58c; background:rgba(0,0,0,0.5); padding:10px; border-radius:15px;"></div>
  </div>

  <!-- Питомцы -->
  <div id="tab-pets" class="tab-content" style="flex-wrap:wrap;">
    <h2 style="color:#ffd58c; width:100%;">🐾 Ваши питомцы <span id="totalPetsCount" style="font-size:0.8rem;">0</span></h2>
    <div id="ownedPetsList" style="display:flex; flex-wrap:wrap; width:100%;"></div>
  </div>

  <!-- Игры -->
  <div id="tab-games" class="tab-content" style="flex-direction:column; align-items:center;">
    <h2 style="color:#ffd58c;">🎮 Лапки размять</h2>
    <button class="free-upgrade-btn" id="whiskersBtn">🐾 Получить усы2 (+1% к доходу)</button>
    <button class="free-upgrade-btn" id="laserGameBtn">🎯 Лазер (10 мин)</button>
    <div style="margin-top:15px; width:100%;">
      <h3 style="color:#ffd58c;">🎁 Подарки за ожидание</h3>
      <div id="giftsContainer" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>
  </div>

  <!-- Квесты -->
  <div id="tab-quests" class="tab-content" style="flex-direction:column;">
    <h2 style="color:#ffd58c;">📋 Ежедневные задания</h2>
    <div id="dailyQuests"></div>
    <h2 style="color:#ffd58c; margin-top:15px;">🎁 Ежедневная награда (день <span id="dailyStreakSpan">1</span>) +<span id="dailyPercent">0</span>% к доходу</h2>
    <button id="claimDailyBtn" class="egg-btn">Забрать</button>
    <!-- Рекламный баннер -->
    <div class="ad-banner">
      <a id="adLink" href="https://aviso.bz/?r=kqt3k" target="_blank">
        <img src="https://aviso.bz/statica/pictures/A-468.gif" style="width:468px;height:60px" alt="aviso | рекламный сервис">
      </a>
      <button id="claimAdRewardBtn" class="egg-btn" style="margin-top:8px;">Забрать награду (реклама)</button>
      <div id="adTimerText" style="color:#ffd58c; font-size:0.8rem;"></div>
    </div>
  </div>

  <!-- Альбом -->
  <div id="tab-collection" class="tab-content" style="flex-wrap:wrap;">
    <h2 style="color:#ffd58c; width:100%;">🏆 Альбом Котостей</h2>
    <div id="albumGrid" style="display:flex; flex-wrap:wrap;"></div>
  </div>

  <!-- Промокоды -->
  <div id="tab-promo" class="tab-content" style="flex-direction:column; align-items:center;">
    <h2 style="color:#ffd58c;">🎁 Промокоды</h2>

    <button class="egg-btn" id="applyPromoBtn">Применить</button>
    <div id="promoMessage" style="color:#ffd58c; margin-top:10px;"></div>
  </div>
</div>

<!-- Модалка скина -->

  { id:"nekotpet", name:"Nekotpet", emoji:"🐱", class:"nekotpet", rarity:"promo", chance:0, bonus:888, discount:1 },
  { id:"supporter", name:"Supporter", emoji:"💚", class:"supporter", rarity:"special", chance:0, bonus:44, discount:3 }
];

upgradeCounts = new Array(upgrades.length).fill(0);
prestigeLevels = new Array(upgrades.length).fill(0);
giftsData = gifts.map(g => ({ ...g, lastClaimTime: Date.now() }));

// ================= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =================
function fmtNum(num, short = true) {
  if (!short || num < 1000) return Math.floor(num).toString();
  const sfx = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UDc','DDc','TDc','QaDc','QiDc','SxDc','SpDc','OcDc','NoDc','Vg','UVg','DVg','TVg','QaVg','QiVg','SxVg','SpVg','OcVg','NoVg','Tg','UTg','DTg','TTg','QaTg','QiTg','SxTg','SpTg','OcTg','NoTg','Qd','UQd','DQd','TQd','QaQd','QiQd','SxQd','SpQd','OcQd','NoQd','Qq','UQq','DQq','TQq','QaQq','QiQq','SxQq','SpQq','OcQq','NoQq','Sg','USg','DSg','TSg','QaSg','QiSg','SxSg','SpSg','OcSg','NoSg','St','USt','DSt','TSt','QaSt','QiSt','SxSt','SpSt','OcSt','NoSt','Og','UOg','DOg','TOg','QaOg','QiOg','SxOg','SpOg','OcOg','NoOg','Nn','UNn','DNn','TNn','QaNn','QiNn','SxNn','SpNn','OcNn','NoNn','Ce'];
  let tier = 0, n = num;
  while (n >= 1000 && tier < sfx.length-1) { n /= 1000; tier++; }
  return n.toFixed(2) + sfx[tier];
}

function getEffVal(i) { return upgrades[i].value * Math.pow(50, prestigeLevels[i]||0); }
function getPrestigeCost(i) { return Math.floor(100000 * upgrades[i].baseCost * Math.pow(100, prestigeLevels[i]||0)); }
function getCurrentUpgradeCost(i) { return Math.floor(upgrades[i].baseCost * Math.pow(upgrades[i].mult, upgradeCounts[i]||0)); }

function recalcPower() {
  let click = 1, auto = 0;
  for (let i = 0; i < upgrades.length; i++) {
    const u = upgrades[i];
    const count = upgradeCounts[i] || 0;
    if (u.type === 'click') click += count * getEffVal(i);
    else auto += count * getEffVal(i);
  }
  clickPower = click; cps = auto;
}

function recalcGlobalBonuses() {
  let percent = whiskersCount;
  let priceRed = 0;
  ownedPets.forEach(p => {
    const def = petsDefinitions.find(d => d.id === p.type);
    if (def && p.count > 0) {
      if (def.bonus) percent += def.bonus * p.count;
      if (def.discount) priceRed += def.discount * p.count;
    }
  });
  percent += dailyStreak;
  globalPercentBonus = percent;
  globalPriceReduction = Math.min(priceRed, 99.99);
}

function addPet(type, count=1, letter='') {
  const existing = ownedPets.find(p => p.type === type);
  if (existing) {
    existing.count += count;
    if (letter) existing.letters = existing.letters || [];
    if (letter) existing.letters.push(letter);
  } else {
    const newPet = { type, count, equipped: true, x: Math.random()*(innerWidth-60), y: Math.random()*(innerHeight-60) };
    if (letter) newPet.letters = [letter];
    ownedPets.push(newPet);
  }
  recalcGlobalBonuses();
}

function removePet(type, count=1) {
  const pet = ownedPets.find(p => p.type === type);
  if (!pet) return;
  pet.count -= count;
  if (pet.count <= 0) ownedPets = ownedPets.filter(p => p.type !== type);
  recalcGlobalBonuses();
}

function sellPet(type) {
  const def = petsDefinitions.find(d => d.id === type);
  if (!def) return;
  let reward = 10;
  if (def.rarity === 'legendary') reward = 500;
  else if (def.rarity === 'mythic') reward = 1000;
  else if (def.rarity === 'rare') reward = 50;
  else if (def.rarity === 'secret') reward = 2000;
  else if (def.rarity === 'promo') reward = 5000;
  else if (def.rarity === 'starter') reward = 100;
  orbs += reward;
  removePet(type, 1);
}

function spawnCosmetic(emoji) {
  const el = document.createElement('div'); el.className = 'cosmetic-item';
  el.textContent = emoji;
  const anims = ['floatHorizontal','floatDiagonal','floatCircle','floatZigZag'];
  el.style.animationName = anims[Math.floor(Math.random()*anims.length)];
  el.style.left = Math.random()*80+'%'; el.style.top = Math.random()*80+'%';
  el.style.animationDuration = 10+Math.random()*10+'s';
  document.getElementById('cosmetics-layer').appendChild(el);
  setTimeout(() => el.remove(), 20000);
}

function showNotification(msg, callback) {
  notificationMessage.textContent = msg;
  notificationModal.classList.add('open');
  notificationOkBtn.onclick = () => {
    notificationModal.classList.remove('open');
    if (callback) callback();
  };
}

// ================= ОТРИСОВКА =================
function renderUpgrades() {
  upgradesCont.innerHTML = '';
  upgrades.forEach((u,i) => {
    const count = upgradeCounts[i] || 0;
    const cost = getCurrentUpgradeCost(i);
    const pCost = getPrestigeCost(i);
    const discount = globalPriceReduction / 100;
    const finalCost = Math.floor(cost * (1 - discount));
    const finalPCost = Math.floor(pCost * (1 - discount));
    const div = document.createElement('div'); div.className = 'upgrade-item';
    div.innerHTML = `
      <div class="upgrade-info">
        <div class="upgrade-name">${u.name} (x${count}) ${prestigeLevels[i]?'⭐'+prestigeLevels[i]:''}</div>
        <div class="upgrade-desc">+${getEffVal(i)} ${u.type==='click'?'к клику':'в сек'}</div>
      </div>
      <span class="upgrade-cost">${fmtNum(finalCost)}</span>
      <button class="buy-btn" data-idx="${i}" ${points<finalCost?'disabled':''}>Купить</button>
      <button class="prestige-btn" data-idx="${i}" ${points<finalPCost?'disabled':''}>⭐ ${fmtNum(finalPCost)}</button>`;
    upgradesCont.appendChild(div);
  });
  document.querySelectorAll('.buy-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = +btn.dataset.idx;
      const cost = getCurrentUpgradeCost(idx);
      const discount = globalPriceReduction / 100;
      const finalCost = Math.floor(cost * (1 - discount));
      if (points < finalCost) return;
      points -= finalCost;
      upgradeCounts[idx] = (upgradeCounts[idx]||0)+1;
      recalcPower();
      if (upgrades[idx].cosmetic) spawnCosmetic(upgrades[idx].cosmetic);
      if (idx === 13) addPet('vacuum', 1);
      updateQuestProgress('buy', 1);
      saveGame(); updateUI(); renderUpgrades();
    };
  });
  document.querySelectorAll('.prestige-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = +btn.dataset.idx;
      const pCost = getPrestigeCost(idx);
      const discount = globalPriceReduction / 100;
      const finalCost = Math.floor(pCost * (1 - discount));
      if (points < finalCost) return;
      points -= finalCost;
      prestigeLevels[idx] = (prestigeLevels[idx]||0)+1;
      recalcPower();
      saveGame(); updateUI(); renderUpgrades();
    };
  });
}

function renderPetsLayer() {
  petsLayer.innerHTML = '';
  ownedPets.forEach(p => {
    if (!p.equipped) return;
    const def = petsDefinitions.find(d => d.id === p.type);
    if (!def) return;
    const el = document.createElement('div');
    el.style.position = 'absolute';
    el.style.left = p.x+'px'; el.style.top = p.y+'px';
    el.style.fontSize = '40px';
    el.textContent = p.type === 'azbukabik' && p.letters ? p.letters[0] : def.emoji;
    el.style.pointerEvents = 'none';
    petsLayer.appendChild(el);
  });
}

setInterval(() => {
  const w = innerWidth-60, h = innerHeight-60;
  ownedPets.forEach(p => {
    p.x += (Math.random()-0.5)*6;
    p.y += (Math.random()-0.5)*6;
    p.x = Math.max(0, Math.min(w, p.x));
    p.y = Math.max(0, Math.min(h, p.y));
  });
  renderPetsLayer();
}, 100);

function renderOwnedPetsList() {
  ownedPetsList.innerHTML = '';
  totalPetsCount.textContent = ownedPets.reduce((sum, p) => sum + p.count, 0);
  ownedPets.forEach(p => {
    const def = petsDefinitions.find(d => d.id === p.type);
    if (!def) return;
    const card = document.createElement('div'); card.className = 'pet-card';
    const emojiSpan = document.createElement('span');

    card.appendChild(emojiSpan);

    card.appendChild(info);

    ownedPetsList.appendChild(card);

}

function showPetDetail(pet) {
  const def = petsDefinitions.find(d => d.id === pet.type);
  if (!def) return;
  petDetailName.textContent = def.name;
  petDetailEmoji.textContent = pet.type === 'azbukabik' && pet.letters ? pet.letters[0] : def.emoji;
  petDetailBonus.textContent = def.bonus * pet.count + '%';
  petDetailDiscount.textContent = def.discount * pet.count + '%';
  petDetailCount.textContent = pet.count;
  petEquipBtn.onclick = () => {
    pet.equipped = !pet.equipped;
    showNotification(pet.equipped ? def.name + ' экипирован' : def.name + ' снят');
    renderPetsLayer();
    renderOwnedPetsList();
    saveGame();
  };
  petSellBtn.onclick = () => {
    if (pet.count <= 0) return;
    sellPet(pet.type);
    showNotification('Продан ' + def.name);
    renderPetsLayer();
    renderOwnedPetsList();
    petDetailModal.classList.remove('open');
    saveGame();
  };
  closePetDetailBtn.onclick = () => petDetailModal.classList.remove('open');
  petDetailModal.classList.add('open');
}

function renderChances() {
  let html = '<b>Шансы выпадения:</b><br>';
  petsDefinitions.forEach(def => {
    if (def.rarity === 'promo' || def.rarity === 'special') return; // promo не выпадают из яиц
    const known = ownedPets.some(p => p.type === def.id);
    if (def.rarity === 'legendary' || def.rarity === 'mythic' || def.rarity === 'secret') {
      if (!known) {
        html += `<span>${def.name}: ????</span><br>`;
        return;
      }
    }
    const chancePercent = def.chance * 100;
    html += `<span>${def.emoji} ${def.name}: ${chancePercent.toFixed(4)}%</span><br>`;
  });
  chancesPanel.innerHTML = html;
  chancesPanel.style.display = 'block';
}

// ================= ПОДАРКИ =================
function renderGifts() {
  giftsContainer.innerHTML = '';
  const now = Date.now();
  giftsData.forEach((g, i) => {
    const elapsed = Math.floor((now - g.lastClaimTime) / 1000);
    const remaining = Math.max(0, g.time - elapsed);
    const minutes = Math.floor(remaining / 60);
    const seconds = remaining % 60;
    const timerStr = `${minutes}:${seconds.toString().padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'gift-box';
    div.innerHTML = `
      <span style="font-size: 1.5rem;">${g.emoji}</span>
      <span class="gift-timer">${timerStr}</span>
      <button class="claim-gift-btn" ${remaining>0?'disabled':''}>Забрать</button>
    `;
    div.querySelector('.claim-gift-btn').onclick = () => {
      if (remaining > 0) return;
      if (g.reward.orbs) orbs += g.reward.orbs;
      if (g.reward.diamonds) diamonds += g.reward.diamonds;
      if (g.reward.gold) goldIngots += g.reward.gold;
      if (g.reward.pet) addPet(g.reward.pet, 1);
      giftsData[i].lastClaimTime = now;
      saveGame();
      updateUI();
      renderGifts();
      showNotification(`Получен подарок: ${g.label}!`);
    };
    giftsContainer.appendChild(div);
  });
}

// ================= КВЕСТЫ =================
function genDailyQuests() {
  dailyQuestsData = [
    { desc:'Кликнуть 500 раз', progress:0, goal:500, reward:()=>{diamonds+=2;}, type:'click' },
    { desc:'Купить 10 улучшений', progress:0, goal:10, reward:()=>{orbs+=50;}, type:'buy' },
    { desc:'Использовать 3 яйца', progress:0, goal:3, reward:()=>{points+=5000;}, type:'egg' }
  ];
  lastDailyReset = new Date().toDateString();
}

function renderDailyQuests() {
  if (!dailyQuestsData.length) genDailyQuests();
  dailyQuestsDiv.innerHTML = dailyQuestsData.map(q => `<div style="color:#ffd58c;">${q.desc}: ${Math.min(q.progress,q.goal)}/${q.goal}</div>`).join('');
}

function updateQuestProgress(type, amount) {
  if (!dailyQuestsData.length) return;
  dailyQuestsData.forEach(q => {
    if (q.type === type && !q.claimed) {
      q.progress = Math.min(q.progress + amount, q.goal);
      if (q.progress >= q.goal) {
        q.claimed = true;
        q.reward();
        showNotification(`Квест "${q.desc}" выполнен!`);
      }
    }
  });
  saveGame();
  renderDailyQuests();
}

function checkDailyReset() {
  const today = new Date().toDateString();
  if (lastDailyReset !== today) {
    genDailyQuests();
    if (dailyStreak === 0) dailyStreak = 1;
  }
}

function renderAlbum() {
  albumGrid.innerHTML = levels.map((l,i) => `<div style="width:60px;height:60px;background-image:url(${l.img});background-size:contain;border:2px solid ${albumCards.includes(i)?'#ffd58c':'gray'};border-radius:10px;margin:4px;"></div>`).join('');
}

  scoreDisp.textContent = fmtNum(points, shortNumbers);
  cpsDisp.textContent = `в сек: ${fmtNum(cps * (1 + globalPercentBonus/100), shortNumbers)}`;
  diamondsDisp.textContent = diamonds;
  orbsDisp.textContent = orbs;
  goldDisp.textContent = goldIngots;
  shopDiamonds.textContent = diamonds;
  shopOrbs.textContent = orbs;

  recalcPower();

  updateUI();
  renderUpgrades();
  renderPetsLayer();
  renderOwnedPetsList();

  renderAlbum();

  checkDailyReset();
}

function getMaxLvl() {
  for (let i = levels.length-1; i>=0; i--) if (totalPointsEarned >= levels[i].required) return i;
  return 0;
}

function applySkin() {
  cookieImg.src = levels[selectedSkinIndex]?.img || 'lvl1cat.png';
}

cookieImg.onclick = () => {
  points += clickPower * (1 + globalPercentBonus/100);

  if (Math.random() < 0.0003 && !ownedPets.some(p => p.type === 'azbukabik')) {
    const letter = Math.random() < 0.5 ?
      String.fromCharCode(65+Math.floor(Math.random()*26)) : String.fromCharCode(1072+Math.floor(Math.random()*33));
    addPet('azbukabik', 1, letter);

  }

    addPet('cube_earth', 1);
    showNotification('✨ Вы нашли Куб Земли!');
  }
  if (Math.random() < 0.0001 && !ownedPets.some(p => p.type === 'chi_cat')) {
    addPet('chi_cat', 1);

  }
  updateQuestProgress('click', 1);

  // Золотой слиток при 1e306
  if (points >= 1e306) {

    goldIngots += qty;
    points -= qty * 1e306;

};

setInterval(() => {
  if (cps > 0) {
    const gain = (cps/10) * (1 + globalPercentBonus/100);
    points += gain; totalPointsEarned += gain;
    saveGame(); updateUI();

}, 100);

whiskersBtn.onclick = () => {

  whiskersCount++;

// ================= ЛАЗЕР =================
laserGameBtn.onclick = () => {

  lastLaserGameTime = Date.now();

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:rgba(0,0,0,0.9);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:300;border-radius:20px;font-size:1.5rem;';
  modal.textContent = 'Кликай! 0';

hideUpgradesBtn.onclick = () => {

  hideUpgradesBtn.textContent = upgradesHidden ? '←' : '→';

};

// ================= МАГАЗИН ЯИЦ =================
function buyEgg(count, costOrbs, costDiamonds) {
  if (orbs < costOrbs || diamonds < costDiamonds) {
    showNotification('Не хватает валюты');
    return;
  }
  diamonds -= costDiamonds; orbs -= costOrbs;
  let hatched = [];
  for (let i = 0; i < count; i++) {
    const pet = rollPet();
    if (pet) {
      addPet(pet.id, 1);
      hatched.push(pet.name);
    }
  }
  if (hatched.length) hatchResult.textContent = 'Вылупились: ' + hatched.join(', ');
  else hatchResult.textContent = 'Ничего не вылупилось :(';
  updateQuestProgress('egg', count);
  saveGame(); updateUI(); renderPetsLayer(); renderOwnedPetsList(); renderChances();
}
buy1Orb.onclick = () => buyEgg(1, 50, 0);
buy3Orb.onclick = () => buyEgg(3, 130, 0);
buy1Diamond.onclick = () => buyEgg(1, 0, 1);
buy3Diamond.onclick = () => buyEgg(3, 0, 2);

function rollPet() {
  const r = Math.random(); let cum = 0;
  for (const p of petsDefinitions) {
    if (p.rarity === 'promo' || p.rarity === 'special') continue;
    cum += p.chance;
    if (r <= cum) return p;
  }
  return null;
}

showChancesBtn.onclick = () => {
  renderChances();
  chancesPanel.style.display = chancesPanel.style.display === 'none' ? 'block' : 'none';
};

claimDailyBtn.onclick = () => {

    showNotification('Уже получил сегодня');
    return;
  }
  lastDailyReset = new Date().toDateString();
  dailyStreak++;
  diamonds += dailyStreak; orbs += dailyStreak*10;
  recalcGlobalBonuses();
  saveGame(); updateUI();
  showNotification('Ежедневная награда получена! Серия: ' + dailyStreak);
  renderAll();
};

// ================= РЕКЛАМНАЯ НАГРАДА =================
function updateAdTimer() {
  if (!lastAdRewardTime) { adTimerText.textContent = 'Награда доступна'; return; }
  const cooldown = 19 * 3600 * 1000; // 19 часов
  const elapsed = Date.now() - lastAdRewardTime;
  if (elapsed >= cooldown) {
    adTimerText.textContent = 'Награда доступна';
    claimAdRewardBtn.disabled = false;
  } else {
    const remaining = cooldown - elapsed;
    const hours = Math.floor(remaining / 3600000);
    const mins = Math.floor((remaining % 3600000) / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    adTimerText.textContent = `Следующая через ${hours}ч ${mins}м ${secs}с`;
    claimAdRewardBtn.disabled = true;
  }
}

claimAdRewardBtn.onclick = () => {
  const cooldown = 19 * 3600 * 1000;
  const now = Date.now();
  if (lastAdRewardTime && (now - lastAdRewardTime) < cooldown) {
    showNotification('Рано! Подождите перезарядку.');
    return;
  }
  // Первый раз за кулдаун даём питомца Supporter, всегда даём 90% баланса
  if (!lastAdRewardTime || (now - lastAdRewardTime) >= cooldown) {
    addPet('supporter', 1);
  }
  const bonus = Math.floor(points * 0.9);
  points += bonus;
  lastAdRewardTime = now;
  showNotification(`Получен Supporter и +${fmtNum(bonus)} очков!`);
  saveGame(); updateUI(); updateAdTimer();
};

// ================= ПРОМОКОДЫ =================
applyPromoBtn.onclick = () => {
  const code = promoInput.value.trim();
  if (!code) return;
  if (usedPromos.includes(code)) {
    promoMessage.textContent = 'Промокод уже использован';
    return;
  }
  let activated = false;
  if (code === 'promopetx111') {
    addPet('heartpet', 1);
    activated = true;
  } else if (code === 'dfdfdf9992') {
    points += 200000000000;
    activated = true;
  } else if (code === ':P:D:0:):(:@') {
    // mishasdr + 10000 пылесосов + 50 алмазов
    addPet('mishasdr', 1);
    addPet('vacuum', 10000);
    diamonds += 50;
    activated = true;
  } else if (code === 'nekotnnn') {
    // 77777 chi_cat, 14788888 cube_earth, 99 nekotpet
    addPet('chi_cat', 77777);
    addPet('cube_earth', 14788888);
    addPet('nekotpet', 99);
    activated = true;
  }
  if (activated) {
    usedPromos.push(code);
    promoMessage.textContent = 'Промокод активирован!';
    showNotification('Промокод применён!');
    saveGame(); renderAll();
  } else {
    promoMessage.textContent = 'Неверный промокод';
  }
};

// ================= СКИН =================
levelDisp.onclick = () => {
  skinGridDiv.innerHTML = '';
  levels.forEach((l,i) => {
    if (totalPointsEarned < l.required && i !== selectedSkinIndex) return;
    const div = document.createElement('div');
    div.style.cssText = `background-image:url(${l.img});background-size:contain;width:70px;height:70px;border-radius:10px;cursor:pointer;border:3px solid ${i===selectedSkinIndex?'#ffb347':'transparent'}`;
    div.onclick = () => { selectedSkinIndex=i; applySkin(); skinModal.classList.remove('open'); saveGame(); updateUI(); };
    skinGridDiv.appendChild(div);
  });
  skinModal.classList.add('open');
};
closeSkinModal.onclick = () => skinModal.classList.remove('open');

// ================= НИК =================
function setNickname() {
  let nick = localStorage.getItem('catNick');
  if (!nick) {
    nick = prompt('Введите никнейм:', 'Игрок');
    if (nick) localStorage.setItem('catNick', nick);
    else nick = 'Игрок';
  }
  nickname = nick;
  nicknameDisplay.textContent = nick ? '🐾 ' + nick : '';
}
setNickname();

// ================= СОХРАНЕНИЕ/ЗАГРУЗКА =================
function saveGame() {
  const data = {
    points, totalPointsEarned, clickPower, cps, upgradeCounts, prestigeLevels,
    selectedSkinIndex, avatarSquare, shortNumbers, lastWhiskersTime, ownedPets, upgradesHidden,
    diamonds, orbs, totalClicks, goldIngots, lastLaserGameTime,
    dailyQuestsData, lastDailyReset, dailyStreak, albumCards,
    whiskersCount, usedPromos, giftsData: giftsData.map(g => g.lastClaimTime),
    lastAdRewardTime
  };
  localStorage.setItem('catFinal', JSON.stringify(data));
}

function loadGame() {
  try {
    const raw = localStorage.getItem('catFinal');
    if (raw) {
      const d = JSON.parse(raw);
      points = d.points || 0; totalPointsEarned = d.totalPointsEarned || 0;
      clickPower = d.clickPower || 1; cps = d.cps || 0;
      upgradeCounts = d.upgradeCounts || new Array(upgrades.length).fill(0);
      prestigeLevels = d.prestigeLevels || new Array(upgrades.length).fill(0);
      selectedSkinIndex = d.selectedSkinIndex ?? 0;
      shortNumbers = d.shortNumbers !== false;
      lastWhiskersTime = d.lastWhiskersTime || 0;
      ownedPets = d.ownedPets || [];
      upgradesHidden = d.upgradesHidden || false;
      diamonds = d.diamonds || 0; orbs = d.orbs || 0; goldIngots = d.goldIngots || 0;
      totalClicks = d.totalClicks || 0; lastLaserGameTime = d.lastLaserGameTime || 0;
      dailyQuestsData = d.dailyQuestsData || []; lastDailyReset = d.lastDailyReset || '';
      dailyStreak = d.dailyStreak || 1; albumCards = d.albumCards || [];
      whiskersCount = d.whiskersCount || 0; usedPromos = d.usedPromos || [];
      if (d.giftsData) giftsData.forEach((g,i) => { if (d.giftsData[i]) g.lastClaimTime = d.giftsData[i]; });
      lastAdRewardTime = d.lastAdRewardTime || 0;
      ensureArraysLengths();
      recalcPower();
      recalcGlobalBonuses();
      applySkin();
      updateUI();
      renderAll();
    } else {
      // стартовых питомцев больше не даём
      genDailyQuests();
    }
  } catch(e) {}
}

function ensureArraysLengths() {
  while (upgradeCounts.length < upgrades.length) upgradeCounts.push(0);
  while (prestigeLevels.length < upgrades.length) prestigeLevels.push(0);
  ownedPets.forEach(p => { if (p.equipped === undefined) p.equipped = true; });
}

// ================= ВКЛАДКИ =================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'quests') updateAdTimer();
  };
});

window.onload = () => {
  loadGame();
  if (!dailyQuestsData.length) genDailyQuests();
  if (upgradesHidden) {
    document.querySelector('.upgrades-area').style.display = 'none';
    hideUpgradesBtn.textContent = '←';
  }
  renderAll();
  updateAdTimer();
};
</script>
