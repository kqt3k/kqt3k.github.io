<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кликер · Котость на автостраде</title>
    <link rel="icon" href="lvl1cat.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 9 / 16;
            background: #2d2d44;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffd58c;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            z-index: 10;
        }
        #balanceDisplay {
            position: absolute;
            top: 50px;
            left: 20px;
            color: #ccffcc;
            font-size: 0.9rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            z-index: 10;
        }
        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            z-index: 20;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }
        .btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            background: #ffaa33;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 4px 0 #7a4b1d;
            transition: 0.1s;
            bottom: 30px;
        }
        .btn:active {
            transform: translateX(-50%) translateY(2px);
            box-shadow: 0 2px 0 #7a4b1d;
        }
        .shop-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #d4a017;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 4px 0 #7a4b1d;
        }
        .shop-btn:active {
            transform: translateX(-50%) translateY(2px);
            box-shadow: 0 2px 0 #7a4b1d;
        }
        .mobile-controls {
            position: absolute;
            top: 55%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 15;
        }
        .ctrl-btn {
            pointer-events: all;
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin: 0 15px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.5); }

        /* Модальное окно магазина */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .modal-content {
            background: #2d2d44;
            border-radius: 20px;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            color: #ffd58c;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { margin-bottom: 10px; }
        .cosmetic-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
            scroll-snap-type: x mandatory;
        }
        .cosmetic-card {
            flex: 0 0 auto;
            width: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 10px;
            scroll-snap-align: start;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .cosmetic-card.selected { border-color: #ffaa33; }
        .cosmetic-card img { width: 80px; height: 80px; object-fit: contain; }
        .cosmetic-card .name { font-size: 0.8rem; margin-top: 5px; }
        .cosmetic-card .cost { font-size: 0.7rem; }
        .close-btn { background: #555; margin-top: 10px; padding: 8px 20px; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="scoreDisplay">0</div>
    <div id="balanceDisplay">💰 0</div>
    <div id="message"></div>

    <!-- Кнопки управления в центре -->
    <div class="mobile-controls">
        <div class="ctrl-btn" id="leftBtn">◀</div>
        <div class="ctrl-btn" id="rightBtn">▶</div>
    </div>

    <button class="btn" id="restartBtn" style="display: none;">Играть</button>
    <button class="btn shop-btn" id="shopBtn">🛒 Косметика</button>
    <button class="btn shop-btn" id="vkResurrectBtn" style="bottom:150px; display:none;">❤️ Воскреснуть (ВК)</button>

    <!-- Модальное окно магазина -->
    <div class="modal" id="shopModal">
        <div class="modal-content">
            <h3>🎨 Косметика</h3>
            <div class="cosmetic-carousel" id="cosmeticCarousel"></div>
            <button class="btn close-btn" id="closeShopBtn">Закрыть</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const messageDiv = document.getElementById('message');
    const restartBtn = document.getElementById('restartBtn');
    const shopBtn = document.getElementById('shopBtn');
    const vkResurrectBtn = document.getElementById('vkResurrectBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const shopModal = document.getElementById('shopModal');
    const cosmeticCarousel = document.getElementById('cosmeticCarousel');
    const closeShopBtn = document.getElementById('closeShopBtn');

    const W = 400, H = 700;
    canvas.width = W; canvas.height = H;

    // ---------- КОСМЕТИКА (цвет, скины, аксессуары) ----------
    const skinImages = [];
    const skinSrcs = ['lvl1cat.png','lvl2cat.png','lvl3cat.png','lvl4cat.png','lvl5cat.png','lvl6cat.png','lvl7cat.png','lvl8cat.png','lvl9cat.png','lvl10cat.png','lvl11cat.png','lvl12cat.png','lvl13cat.png','lvl14cat.png'];
    skinSrcs.forEach(src => { const img = new Image(); img.src = src; skinImages.push(img); });
    let currentSkinIndex = 0;
    try { const shared = parseInt(localStorage.getItem('shared_skin_index')); if (!isNaN(shared) && shared >= 0 && shared < skinImages.length) currentSkinIndex = shared; } catch(e) {}

    let carColor = localStorage.getItem('carColor') || '#ffaa33';
    let currentAccessory = localStorage.getItem('currentAccessory') || 'none';
    let ownedAccessories = JSON.parse(localStorage.getItem('ownedAccessories') || '["none"]');

    const accessoryDefs = [
        { id: 'none', name: 'Без аксессуара', emoji: '', cost: 0, draw: null },
        { id: 'spoiler', name: 'Спойлер', emoji: '🏎️', cost: 500, draw: (ctx, x, y, w, h) => { ctx.fillStyle='#555'; ctx.fillRect(x-10, y-15, w+20, 8); } },
        { id: 'roof_box', name: 'Бокс на крыше', emoji: '📦', cost: 800, draw: (ctx, x, y, w, h) => { ctx.fillStyle='#888'; ctx.fillRect(x+15, y-25, 20, 15); } },
        { id: 'flame', name: 'Огненные полосы', emoji: '🔥', cost: 1200, draw: (ctx, x, y, w, h) => { ctx.fillStyle='orange'; ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x-10, y+h+20); ctx.lineTo(x+10, y+h+15); ctx.fill(); } },
        { id: 'neon', name: 'Неон', emoji: '💡', cost: 1500, draw: (ctx, x, y, w, h) => { ctx.strokeStyle='cyan'; ctx.lineWidth=2; ctx.strokeRect(x-2, y-2, w+4, h+4); } },
        { id: 'wings', name: 'Крылья', emoji: '🪽', cost: 2000, draw: (ctx, x, y, w, h) => { ctx.fillStyle='white'; ctx.fillRect(x-15, y+20, 10, 20); ctx.fillRect(x+w+5, y+20, 10, 20); } },
        { id: 'spoiler2', name: 'Большой спойлер', emoji: '🏁', cost: 2500, draw: (ctx, x, y, w, h) => { ctx.fillStyle='#333'; ctx.fillRect(x-15, y-20, w+30, 12); } },
        { id: 'antenna', name: 'Антенна', emoji: '📡', cost: 600, draw: (ctx, x, y, w, h) => { ctx.strokeStyle='silver'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x+w/2, y-10); ctx.lineTo(x+w/2, y-30); ctx.stroke(); ctx.beginPath(); ctx.arc(x+w/2, y-30, 4, 0, Math.PI*2); ctx.fillStyle='red'; ctx.fill(); } },
        { id: 'exhaust', name: 'Двойной выхлоп', emoji: '💨', cost: 1000, draw: (ctx, x, y, w, h) => { ctx.fillStyle='#444'; ctx.fillRect(x+5, y+h, 10, 10); ctx.fillRect(x+w-15, y+h, 10, 10); } }
    ];

    function setAccessory(id) {
        if (!ownedAccessories.includes(id)) return;
        currentAccessory = id;
        localStorage.setItem('currentAccessory', id);
    }
    function setSkin(index) {
        if (index < 0 || index >= skinImages.length) return;
        currentSkinIndex = index;
        localStorage.setItem('shared_skin_index', index);
    }
    function setCarColor(c) { carColor = c; localStorage.setItem('carColor', c); }

    // ---------- МАГАЗИН КОСМЕТИКИ ----------
    function buildCosmeticCards() {
        cosmeticCarousel.innerHTML = '';
        // Карточки цвета
        const colors = [
            { name: 'Оранжевый', color: '#ffaa33', preview: (ctx) => { ctx.fillStyle='#ffaa33'; ctx.fillRect(0,0,80,80); } },
            { name: 'Синий', color: '#3399ff', preview: (ctx) => { ctx.fillStyle='#3399ff'; ctx.fillRect(0,0,80,80); } },
            { name: 'Зелёный', color: '#33cc55', preview: (ctx) => { ctx.fillStyle='#33cc55'; ctx.fillRect(0,0,80,80); } },
            { name: 'Фиолетовый', color: '#aa44ff', preview: (ctx) => { ctx.fillStyle='#aa44ff'; ctx.fillRect(0,0,80,80); } }
        ];
        colors.forEach(c => addCard({ type: 'color', name: c.name, id: c.color, cost: 0, owned: true, preview: c.preview }));
        // Скины
        skinSrcs.forEach((src, i) => {
            addCard({ type: 'skin', name: 'Ур.'+(i+1), id: i, cost: 0, owned: true, preview: (ctx) => { if (skinImages[i] && skinImages[i].complete) ctx.drawImage(skinImages[i], 0, 0, 80, 80); } });
        });
        // Аксессуары
        accessoryDefs.forEach(acc => {
            addCard({ type: 'accessory', name: acc.name, id: acc.id, cost: acc.cost, owned: ownedAccessories.includes(acc.id), preview: (ctx) => { ctx.fillStyle='#aaa'; ctx.fillRect(10,30,60,20); if (acc.draw) acc.draw(ctx, 10, 30, 60, 20); } });
        });
    }
    function addCard(item) {
        const card = document.createElement('div');
        card.className = 'cosmetic-card';
        if ((item.type==='color' && carColor===item.id) || (item.type==='skin' && currentSkinIndex===item.id) || (item.type==='accessory' && currentAccessory===item.id)) card.classList.add('selected');
        const canvas = document.createElement('canvas');
        canvas.width = 80; canvas.height = 80;
        const cctx = canvas.getContext('2d');
        if (item.preview) item.preview(cctx);
        card.appendChild(canvas);
        card.innerHTML += `<div class="name">${item.name}</div><div class="cost">${item.cost > 0 ? item.cost+' очков' : 'Бесплатно'}</div>`;
        card.onclick = () => {
            if (item.type === 'color') setCarColor(item.id);
            else if (item.type === 'skin') setSkin(item.id);
            else if (item.type === 'accessory') {
                if (!item.owned) {
                    if (getBalance() >= item.cost) {
                        spendPoints(item.cost);
                        ownedAccessories.push(item.id);
                        localStorage.setItem('ownedAccessories', JSON.stringify(ownedAccessories));
                        setAccessory(item.id);
                    } else { alert('Недостаточно очков'); }
                } else { setAccessory(item.id); }
            }
            buildCosmeticCards(); // обновить выделение
        };
        cosmeticCarousel.appendChild(card);
    }
    shopBtn.onclick = () => { shopModal.style.display = 'flex'; buildCosmeticCards(); };
    closeShopBtn.onclick = () => { shopModal.style.display = 'none'; };

    // ---------- ОБЩИЙ БАЛАНС ----------
    const SHARED_KEY = 'shared_cat_points';
    function getBalance() { return parseInt(localStorage.getItem(SHARED_KEY) || '0'); }
    function spendPoints(amount) {
        let bal = getBalance();
        if (bal < amount) return false;
        bal -= amount;
        localStorage.setItem(SHARED_KEY, bal.toString());
        updateBalanceDisplay();
        return true;
    }
    function updateBalanceDisplay() { balanceDisplay.textContent = '💰 ' + getBalance(); }

    // ---------- ВОСКРЕШЕНИЕ ВК ----------
    const VK_RESURRECT_KEY = 'vk_resurrect_time';
    function canVkResurrect() { const last = parseInt(localStorage.getItem(VK_RESURRECT_KEY) || '0'); return Date.now() - last > 24*60*60*1000; }
    vkResurrectBtn.onclick = () => {
        if (!canVkResurrect()) { alert('Воскрешение раз в 24 часа.'); return; }
        window.open('https://vk.com/club238691099', '_blank');
        setTimeout(() => {
            if (confirm('Вы подписались на ВК?')) {
                localStorage.setItem(VK_RESURRECT_KEY, Date.now().toString());
                reset();
                messageDiv.textContent = '';
                restartBtn.style.display = 'none';
                vkResurrectBtn.style.display = 'none';
            }
        }, 5000);
    };

    // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
    let gameActive = false;
    let score = 0;
    let frames = 0;
    let shieldActive = false, shieldTimer = 0;
    let doublePoints = false, doubleTimer = 0;
    let magnetActive = false, magnetTimer = 0;

    // Машинка теперь выше, чем раньше (y = 500)
    const player = { x: W/2-25, y: 500, w: 50, h: 70, speed: 5 };
    const road = { x: 50, w: W-100, laneCount: 3, get laneWidth() { return this.w / this.laneCount; } };
    let obstacles = [];
    const OBSTACLE_SPAWN_RATE = 40;
    let spawnCounter = 0;
    let OBSTACLE_SPEED = 5;

    function getClickerBonus() {
        const bonus = parseFloat(localStorage.getItem('shared_bonus_percent') || '0');
        return Math.max(0.3, 1 - bonus / 100);
    }

    // ---------- ПРЕПЯТСТВИЯ (теперь могут двигаться зигзагом) ----------
    class Obstacle {
        constructor() {
            this.w = road.laneWidth - 10; this.h = 40;
            this.lane = Math.floor(Math.random() * road.laneCount);
            this.x = road.x + this.lane * road.laneWidth + 5;
            this.y = -this.h;
            this.baseSpeed = OBSTACLE_SPEED + Math.floor(score/500)*0.5;
            this.zigzag = Math.random() < 0.4; // 40% шанс зигзага
            this.zigzagAmp = 20 + Math.random()*20;
            this.zigzagFreq = 0.02 + Math.random()*0.03;
            this.phase = Math.random()*Math.PI*2;
            this.color = `hsl(${Math.random()*360},80%,50%)`;
        }
        update() {
            this.y += this.baseSpeed;
            if (this.zigzag) {
                this.x += Math.sin(this.y * this.zigzagFreq + this.phase) * this.zigzagAmp * 0.05;
                this.x = Math.max(road.x, Math.min(road.x + road.w - this.w, this.x));
            }
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(this.x+this.w*0.3, this.y+this.h*0.3, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(this.x+this.w*0.7, this.y+this.h*0.3, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(this.x+this.w*0.3, this.y+this.h*0.3, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(this.x+this.w*0.7, this.y+this.h*0.3, 2, 0, Math.PI*2); ctx.fill();
        }
    }

    // ---------- ПАССАЖИРЫ И МОНЕТКИ ----------
    let passengers = [];
    let coins = [];
    const PASSENGER_SPAWN_RATE = 200;
    let passengerSpawnCounter = 0;
    const COIN_SPAWN_RATE = 60;
    let coinSpawnCounter = 0;

    class Coin {
        constructor() {
            this.x = road.x + Math.floor(Math.random()*road.laneCount)*road.laneWidth + road.laneWidth/2 - 10;
            this.y = -30;
            this.r = 8;
            this.speed = 3;
        }
        update() { this.y += this.speed; }
        draw(ctx) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r-2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // ... класс Passenger и остальное без изменений (возьмём из предыдущей версии)
    // Здесь я вставлю компактный код пассажиров, как раньше
    class Passenger {
        constructor() {
            const types = [
                { emoji: '🐱', name: 'Котость', effect: 'shield' },
                { emoji: '🤖', name: 'Пылесос', effect: 'slow' },
                { emoji: '🟫', name: 'Куб Земли', effect: 'double' },
                { emoji: '🌟', name: 'Звезда', effect: 'score' },
                { emoji: '🧲', name: 'Магнит', effect: 'magnet' },
                { emoji: '⚡', name: 'Молния', effect: 'speed_boost' },
                { emoji: '💎', name: 'Алмаз', effect: 'bonus_points' }
            ];
            const type = types[Math.floor(Math.random()*types.length)];
            this.emoji = type.emoji; this.name = type.name; this.effect = type.effect;
            this.x = road.x + Math.floor(Math.random()*road.laneCount)*road.laneWidth + 5;
            this.y = -30;
            this.w = 30; this.h = 30;
            this.speed = 3;
        }
        update() { this.y += this.speed; }
        draw(ctx) { ctx.font = '30px serif'; ctx.fillText(this.emoji, this.x, this.y+30); }
    }

    function applyPassengerEffect(effect) {
        switch(effect) {
            case 'shield': shieldActive = true; shieldTimer = 300; break;
            case 'slow': OBSTACLE_SPEED = Math.max(2, OBSTACLE_SPEED-2); setTimeout(()=>{OBSTACLE_SPEED=5*getClickerBonus();},5000); break;
            case 'double': doublePoints = true; doubleTimer = 300; break;
            case 'score': syncPoints(50); break;
            case 'magnet': magnetActive = true; magnetTimer = 200; break;
            case 'speed_boost': player.speed *= 1.5; setTimeout(()=>{player.speed=5;},5000); break;
            case 'bonus_points': syncPoints(200); break;
        }
    }

    // ---------- ОЧКИ ----------
    function syncPoints(addAmount) {
        let amt = addAmount;
        if (doublePoints) amt *= 2;
        score += amt;
        let total = getBalance() + amt;
        localStorage.setItem(SHARED_KEY, total.toString());
        updateBalanceDisplay();
        scoreDisplay.textContent = score;
    }

    function rectCollide(r1, r2) {
        return r1.x < r2.x+r2.w && r1.x+r1.w > r2.x && r1.y < r2.y+r2.h && r1.y+r1.h > r2.y;
    }

    function reset() {
        gameActive = true;
        score = 0; frames = 0;
        obstacles = []; spawnCounter = 0;
        passengers = []; passengerSpawnCounter = 0;
        coins = []; coinSpawnCounter = 0;
        shieldActive = false; doublePoints = false; magnetActive = false;
        OBSTACLE_SPEED = 5 * getClickerBonus();
        player.x = W/2-25; player.speed = 5;
        scoreDisplay.textContent = '0';
        messageDiv.textContent = '';
        restartBtn.style.display = 'none';
        vkResurrectBtn.style.display = 'none';
        updateBalanceDisplay();
    }

    function gameOver() {
        gameActive = false;
        messageDiv.innerHTML = `Игра окончена!<br>Очки: ${score}`;
        restartBtn.style.display = 'block';
        if (canVkResurrect()) vkResurrectBtn.style.display = 'block';
    }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function update() {
        if (!gameActive) return;
        if (shieldActive && --shieldTimer <= 0) shieldActive = false;
        if (doublePoints && --doubleTimer <= 0) doublePoints = false;
        if (magnetActive && --magnetTimer <= 0) magnetActive = false;

        spawnCounter++;
        if (spawnCounter >= OBSTACLE_SPAWN_RATE) { spawnCounter = 0; obstacles.push(new Obstacle()); }
        passengerSpawnCounter++;
        if (passengerSpawnCounter >= PASSENGER_SPAWN_RATE) { passengerSpawnCounter = 0; passengers.push(new Passenger()); }
        coinSpawnCounter++;
        if (coinSpawnCounter >= COIN_SPAWN_RATE) { coinSpawnCounter = 0; coins.push(new Coin()); }

        for (let i = obstacles.length-1; i >= 0; i--) {
            obstacles[i].update();
            if (rectCollide(player, obstacles[i])) {
                if (shieldActive) { obstacles.splice(i,1); shieldActive = false; }
                else { gameOver(); return; }
            }
            if (obstacles[i].y > H+50) { obstacles.splice(i,1); syncPoints(doublePoints?20:10); }
        }

        for (let i = passengers.length-1; i >= 0; i--) {
            passengers[i].update();
            if (magnetActive) {
                const dx = (player.x + player.w/2) - (passengers[i].x + 15);
                if (Math.abs(dx) < 100) passengers[i].x += dx * 0.1;
            }
            if (rectCollide(player, passengers[i])) {
                applyPassengerEffect(passengers[i].effect);
                passengers.splice(i,1);
            } else if (passengers[i].y > H+50) { passengers.splice(i,1); }
        }

        for (let i = coins.length-1; i >= 0; i--) {
            coins[i].update();
            const coinRect = { x: coins[i].x - coins[i].r, y: coins[i].y - coins[i].r, w: coins[i].r*2, h: coins[i].r*2 };
            if (rectCollide(player, coinRect)) {
                syncPoints(5);
                coins.splice(i,1);
            } else if (coins[i].y > H+50) { coins.splice(i,1); }
        }

        if (frames % 60 === 0) syncPoints(1);
        frames++;
    }

    function draw() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = '#333355'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#555577'; ctx.fillRect(road.x,0,road.w,H);
        ctx.strokeStyle = '#ffd58c'; ctx.lineWidth = 2; ctx.setLineDash([20,30]);
        for (let i=1; i<road.laneCount; i++) {
            const x = road.x + i*road.laneWidth;
            ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
        }
        ctx.setLineDash([]);
        obstacles.forEach(o => o.draw(ctx));
        passengers.forEach(p => p.draw(ctx));
        coins.forEach(c => c.draw(ctx));

        // Машина с аксессуарами и скином
        ctx.fillStyle = carColor;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(player.x+5, player.y+10, 15, 15);
        ctx.fillRect(player.x+30, player.y+10, 15, 15);
        ctx.fillStyle = '#222';
        ctx.fillRect(player.x-5, player.y+15, 10, 20);
        ctx.fillRect(player.x+player.w-5, player.y+15, 10, 20);
        ctx.fillRect(player.x-5, player.y+player.h-25, 10, 20);
        ctx.fillRect(player.x+player.w-5, player.y+player.h-25, 10, 20);

        const acc = accessoryDefs.find(a => a.id === currentAccessory);
        if (acc && acc.draw) acc.draw(ctx, player.x, player.y, player.w, player.h);

        const skinImg = skinImages[currentSkinIndex];
        if (skinImg && skinImg.complete) {
            ctx.drawImage(skinImg, player.x+player.w/2-20, player.y-45, 40, 40);
        } else {
            ctx.fillStyle = '#c4870a'; ctx.beginPath(); ctx.arc(player.x+player.w/2, player.y-10, 15, 0, Math.PI*2); ctx.fill();
        }
        if (shieldActive) {
            ctx.strokeStyle = 'cyan'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(player.x+player.w/2, player.y+player.h/2, 45, 0, Math.PI*2); ctx.stroke();
        }
    }

    // ---------- УПРАВЛЕНИЕ ----------
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; if (!gameActive && e.key === ' ') reset(); });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    leftBtn.addEventListener('pointerdown', () => { keys['ArrowLeft'] = true; });
    leftBtn.addEventListener('pointerup', () => { keys['ArrowLeft'] = false; });
    leftBtn.addEventListener('pointerleave', () => { keys['ArrowLeft'] = false; });
    rightBtn.addEventListener('pointerdown', () => { keys['ArrowRight'] = true; });
    rightBtn.addEventListener('pointerup', () => { keys['ArrowRight'] = false; });
    rightBtn.addEventListener('pointerleave', () => { keys['ArrowRight'] = false; });
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const relX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        keys['ArrowLeft'] = relX < canvas.clientWidth/2;
        keys['ArrowRight'] = relX >= canvas.clientWidth/2;
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const relX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        keys['ArrowLeft'] = relX < canvas.clientWidth/2;
        keys['ArrowRight'] = relX >= canvas.clientWidth/2;
    });
    canvas.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; keys['ArrowRight'] = false; });
    restartBtn.addEventListener('click', reset);

    function handleInput() {
        if (!gameActive) return;
        if (keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['ф'] || keys['Ф']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['в'] || keys['В']) player.x += player.speed;
        player.x = Math.max(road.x, Math.min(player.x, road.x+road.w-player.w));
    }

    function gameLoop() { handleInput(); update(); draw(); requestAnimationFrame(gameLoop); }

    reset();
    updateBalanceDisplay();
    gameLoop();
})();
</script>
</body>
</html>
